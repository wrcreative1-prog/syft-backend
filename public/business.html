<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syft for Business</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ─────────────────────────────────────────────────────────── */
:root {
  --amber:       #F59E0B;
  --amber-light: #FCD34D;
  --amber-deep:  #D97706;
  --amber-pale:  #FEF3C7;
  --cream:       #FFFBF0;
  --warm-white:  #FEF9EE;
  --brown:       #78350F;
  --text:        #1C0A00;
  --muted:       #92400E;
  --border:      #FDE68A;
  --surface:     #FFFFFF;
  --success:     #16A34A;
  --danger:      #DC2626;
  --danger-pale: #FEF2F2;
  --sidebar-w:   220px;
  --fn:          'Space Grotesk', sans-serif;
}

, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(-cream);
  color: var(-text);
  min-height: 100%;
  -webcit-font-smoothing: antialiased;
}

/* ── Typography helpers ─────────────────────────────────────────────────────────── */
.h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
.h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 800; }
.h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 700; }
.num { font-family: var(--fn; }

/* ── Auth view ─────────────────────────────────────────────────────────── */
#auth-view {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  background: radial-gradient(ellipse at 60% 0%, #fde68a33 0%, transparent 60%),
              var(--cream);
}

.auth-card {
  background: white;
  border: 1px solid var(-border);
  border-radius: 20px;
  padding: 40px 40px 36px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 8px 40px rgba(245, 158, 11, 0.08);
}

.auth-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.auth-logo-mark {
  width: 32px; height: 32px;
  background: var(-amber);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.auth-logo-mark svg { width: 16px; height: 16px; stroke: white; fill: none; }
.auth-logo-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 20px;
  color: var(--text);
}
.auth-logo-badge {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(-amber-deep);
  background: var(-amber-pale);
  padding: 3px 8px;
  border-radius: 20px;
}
.auth-tagline {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 28px;
  line-height: 1.4;
}
